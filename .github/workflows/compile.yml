name: Build FFmpeg HarmonyOS Libraries

on:
  workflow_dispatch:
    inputs:
      ffmpeg_ref:
        description: FFmpeg git ref or tag
        required: false
        default: n7.1
      ohos_sdk_url:
        description: Official HarmonyOS SDK package URL
        required: false
        default: https://repo.huaweicloud.com/harmonyos/os/5.0.0-Release/ohos-sdk-windows_linux-public.tar.gz
      archs:
        description: Target architectures, separated by commas
        required: false
        default: arm64-v8a
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  build-ffmpeg-ohos:
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    env:
      FFMPEG_SOURCE_DIR: ${{ github.workspace }}/ffmpeg
      FFMPEG_BUILD_DIR: ${{ github.workspace }}/build-ohos
      OHOS_ARCH_LIST: ${{ inputs.archs }}
      FFMPEG_SKIP_DEP_UPDATES: "1"
      OHOS_SDK_URL: ${{ inputs.ohos_sdk_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            automake \
            build-essential \
            cmake \
            curl \
            git \
            libtool \
            meson \
            ninja-build \
            pkg-config \
            python3 \
            unzip \
            yasm

      - name: Download FFmpeg source
        run: |
          git clone --depth 1 --branch "${{ inputs.ffmpeg_ref }}" https://github.com/FFmpeg/FFmpeg.git "$FFMPEG_SOURCE_DIR"

      - name: Download HarmonyOS Native SDK
        shell: bash
        run: |
          set -euo pipefail
          SDK_WORK="$RUNNER_TEMP/ohos-sdk"
          mkdir -p "$SDK_WORK"
          curl -L --retry 5 --retry-delay 5 "$OHOS_SDK_URL" -o "$SDK_WORK/ohos-sdk.tar.gz"
          tar -xzf "$SDK_WORK/ohos-sdk.tar.gz" -C "$SDK_WORK"

          NATIVE_ZIP=$(find "$SDK_WORK" -type f \( -name 'native-linux-x64-*.zip' -o -name 'native-*.zip' \) | head -n 1)
          if [ -z "${NATIVE_ZIP:-}" ]; then
            echo "Unable to locate HarmonyOS native SDK zip inside package:"
            find "$SDK_WORK" -maxdepth 3 -type f | sort
            exit 1
          fi

          unzip -q "$NATIVE_ZIP" -d "$SDK_WORK/native-sdk"
          OHOS_NATIVE=$(find "$SDK_WORK/native-sdk" -type d -path '*/native' | head -n 1)
          if [ -z "${OHOS_NATIVE:-}" ]; then
            echo "Unable to locate extracted native SDK directory."
            find "$SDK_WORK/native-sdk" -maxdepth 4 -type d | sort
            exit 1
          fi

          echo "OHOS_NATIVE_SDK_PATH=$OHOS_NATIVE" >> "$GITHUB_ENV"

      - name: Build FFmpeg for HarmonyOS
        shell: bash
        run: |
          set -euo pipefail
          bash "$GITHUB_WORKSPACE/harmony.sh"

      - name: Package build outputs
        shell: bash
        run: |
          set -euo pipefail
          ARCHIVE_NAME="ffmpeg-harmonyos-${{ github.run_number }}.tar.gz"
          tar -czf "$ARCHIVE_NAME" -C "$GITHUB_WORKSPACE" build-ohos
          echo "ARCHIVE_NAME=$ARCHIVE_NAME" >> "$GITHUB_ENV"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-harmonyos
          path: |
            ${{ github.workspace }}/build-ohos
            ${{ github.workspace }}/${{ env.ARCHIVE_NAME }}
          if-no-files-found: error
